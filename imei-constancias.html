<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVO — Constancias de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1e46e6;
    --accent2: #0f2a9e;
    --ink: #0a0a0f;
    --ink2: #1a1a2e;
    --bg: #f4f6ff;
    --surface: #ffffff;
    --border: #e2e8f0;
    --muted: #94a3b8;
    --success: #16a34a;
    --error: #dc2626;
    --warn: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--ink2); min-height: 100vh; }

  .topbar { background: #000; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-brand { font-weight: 800; font-size: 14px; color: #fff; letter-spacing: .1em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .topbar-brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .topbar-date { font-size: 12px; color: rgba(255,255,255,0.4); }

  .hero { background: #000; color: #fff; padding: 40px 32px 48px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(30,70,230,0.3), transparent 70%); }
  .hero h1 { font-size: 28px; font-weight: 800; line-height: 1.2; position: relative; }
  .hero h1 span { color: var(--accent); }
  .hero p { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.5); position: relative; }

  .main { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

  .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; animation: fadeUp 0.3s ease both; }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .role-btn { border: 2px solid var(--border); border-radius: 12px; padding: 20px 16px; text-align: center; cursor: pointer; background: var(--bg); transition: all 0.2s; font-family: 'Exo 2', sans-serif; }
  .role-btn:hover { border-color: var(--accent); background: #f0f4ff; }
  .role-btn.active { border-color: var(--accent); background: #f0f4ff; }
  .role-icon { font-size: 28px; margin-bottom: 8px; }
  .role-label { font-size: 14px; font-weight: 700; color: var(--ink2); }
  .role-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; letter-spacing: .04em; }
  .field input, .field select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Exo 2', sans-serif; font-size: 14px; color: var(--ink2); background: var(--bg); transition: border-color 0.2s; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .search-wrap { position: relative; }
  .search-wrap input { padding-right: 80px; }
  .search-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-family: 'Exo 2', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }

  .imei-list { display: flex; flex-direction: column; gap: 10px; }
  .imei-card { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; cursor: pointer; }
  .imei-card:hover { border-color: #a5b4fc; }
  .imei-card.selected { border-color: var(--accent); background: #f8f9ff; }
  .imei-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .imei-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; color: transparent; }
  .imei-card.selected .imei-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .imei-info { flex: 1; }
  .imei-number { font-size: 13px; font-weight: 700; color: var(--ink2); letter-spacing: .04em; }
  .imei-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .imei-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0; background: #fff7ed; color: var(--warn); }

  .select-all-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .link-btn { background: none; border: none; color: var(--accent); font-family: 'Exo 2', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline; }
  .count-badge { font-size: 12px; font-weight: 700; color: var(--accent); }

  .imei-upload-item { border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .imei-upload-item.done { border-color: var(--success); }
  .imei-upload-header { background: var(--bg); padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .imei-upload-header .imei-num { font-size: 13px; font-weight: 700; color: var(--ink2); }
  .imei-upload-header .imei-det { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .imei-upload-body { padding: 12px 14px; }

  .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-zone:hover { border-color: var(--accent); background: #f0f4ff; }
  .upload-zone.has-file { border-color: var(--success); background: #f0fdf4; }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 16px; }
  .upload-icon { font-size: 22px; margin-bottom: 4px; }
  .upload-text { font-size: 12px; font-weight: 600; color: var(--ink2); }
  .upload-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .upload-filename { font-size: 11px; color: var(--success); font-weight: 600; margin-top: 6px; display: none; }
  .preview-thumb { width: 100%; max-height: 140px; object-fit: cover; border-radius: 6px; margin-top: 8px; display: none; }

  .progress-bar { background: var(--bg); border-radius: 4px; height: 6px; margin: 12px 0 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--muted); text-align: right; }

  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; letter-spacing: .04em; }
  .btn-primary:hover:not(:disabled) { background: var(--accent2); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-secondary { padding: 12px 28px; background: transparent; color: var(--accent); border: 2px solid var(--accent); border-radius: 10px; font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }

  .loading { display: none; text-align: center; padding: 16px; color: var(--muted); font-size: 13px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }

  .badge-info { padding: 8px 12px; background: var(--bg); border-radius: 8px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  #success-screen { display: none; text-align: center; padding: 40px 24px; }
  .success-icon { width: 72px; height: 72px; background: #f0fdf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 16px; border: 2px solid #bbf7d0; }
  .success-title { font-size: 22px; font-weight: 800; color: var(--success); margin-bottom: 8px; }
  .success-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .section-num { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
  .hidden { display: none !important; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><div class="dot"></div> VIVO — Constancias de Venta</div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<div class="hero">
  <h1>Portal de<br><span>Constancias</span></h1>
  <p>📅 Fecha límite: <span style="color:#fff">06-04-2026</span></p>
</div>

<div class="main">

  <!-- STEP 1: ROL -->
  <div class="card" id="step-rol">
    <div class="card-title"><span class="section-num">1</span> ¿Quién sos?</div>
    <div class="role-grid">
      <div class="role-btn" id="btn-promotor" onclick="elegirRol('promotor')">
        <div class="role-icon">👤</div>
        <div class="role-label">Soy promotor</div>
        <div class="role-sub">Ingresá tu DNI</div>
      </div>
      <div class="role-btn" id="btn-supervisor" onclick="elegirRol('supervisor')">
        <div class="role-icon">👔</div>
        <div class="role-label">Soy supervisor</div>
        <div class="role-sub">Elegí tu nombre</div>
      </div>
    </div>
  </div>

  <!-- STEP 2A: SUPERVISOR -->
  <div class="card hidden" id="step-supervisor">
    <div class="card-title"><span class="section-num">2</span> Tu nombre</div>
    <div class="field">
      <label>Supervisor</label>
      <select id="supervisor-select" onchange="seleccionarSupervisor()">
        <option value="">— Seleccioná tu nombre —</option>
      </select>
    </div>
    <div class="loading" id="loading-supervisores"><span class="spinner"></span> Cargando...</div>
  </div>

  <!-- STEP 2B / 3: DNI o selector promotor -->
  <div class="card hidden" id="step-dni">
    <div class="card-title">
      <span class="section-num" id="dni-num">2</span>
      <span id="dni-title">Tu DNI</span>
    </div>
    <div id="supervisor-badge" class="badge-info hidden"></div>

    <div id="bloque-dni">
      <div class="field">
        <label id="dni-label">Ingresá tu DNI</label>
        <div class="search-wrap">
          <input type="number" id="dni-input" placeholder="Ej: 70034656"
            onkeydown="if(event.key==='Enter') buscarDNI()">
          <button class="search-btn" onclick="buscarDNI()">Buscar</button>
        </div>
      </div>
      <div class="loading" id="loading-dni"><span class="spinner"></span> Buscando...</div>
    </div>

    <div id="bloque-promotor-select" class="hidden">
      <div class="field">
        <label>Promotor</label>
        <select id="promotor-select" onchange="seleccionarPromotor()">
          <option value="">— Seleccioná un promotor —</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STEP 3/4: IMEI LIST -->
  <div class="card hidden" id="step-imeis">
    <div class="card-title">
      <span class="section-num" id="imei-num">3</span> IMEIs pendientes
    </div>
    <div id="promotor-info" class="badge-info"></div>
    <div class="select-all-bar">
      <button class="link-btn" onclick="selectAll()">Seleccionar todos</button>
      <span class="count-badge" id="count-badge"></span>
    </div>
    <div id="imei-list" class="imei-list"></div>
    <div style="margin-top:16px;">
      <button class="btn-primary" id="btn-continuar" onclick="irAUpload()" disabled>
        Continuar →
      </button>
    </div>
  </div>

  <!-- STEP 4/5: UPLOAD POR IMEI -->
  <div class="card hidden" id="step-upload">
    <div class="card-title">
      <span class="section-num" id="upload-num">4</span> Fotos de constancia
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 de 0 fotos cargadas</div>
    <div id="imei-upload-list" style="margin-top:16px;"></div>
    <div style="margin-top:16px;">
      <button class="btn-primary" id="btn-enviar" onclick="enviarConstancias()" disabled>
        Enviar constancias
      </button>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">¡Listo!</div>
    <div class="success-sub" id="success-msg"></div>
    <button class="btn-secondary" onclick="resetApp()">Cargar más constancias</button>
  </div>

</div>

<script>
const SHEETS_ID = '1zG2FPWytGCSbhXblBRe1t6L23lWm0YAKjh3eBnzjqEA';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMG93dz39SiCrvHAooHz_kCLwNOiIfxt9FY68KmSaRYOHnpFNFHfkGNdnSpv5V6EKT/exec';

let todosLosIMEIs = [];
let constanciasStatus = {};
let rolSeleccionado = null;
let supervisorSeleccionado = null;
let imeisPromotor = [];
let imeisSeleccionados = new Set();
let fotosMap = {};

// ── CAMBIO 1: Función para parsear fechas de Google Sheets ──
function parseFecha(val) {
  if (!val) return '';
  const m = String(val).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) {
    const y = m[1];
    const mes = String(parseInt(m[2]) + 1).padStart(2, '0');
    const d = String(m[3]).padStart(2, '0');
    return `${d}/${mes}/${y}`;
  }
  return val;
}

document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('es-PE', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

cargarDatos();

async function cargarDatos() {
  try {
    const url = 'https://docs.google.com/spreadsheets/d/' + SHEETS_ID + '/gviz/tq?tqx=out:json&sheet=IMEIs';
    const res = await fetch(url, { mode: 'cors' });
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows;

    const i = {
      supervisor: cols.findIndex(c => c.toLowerCase().includes('supervisor')),
      dni: cols.findIndex(c => c.toLowerCase() === 'dni'),
      user: cols.findIndex(c => c.toLowerCase() === 'user'),
      fecha: cols.findIndex(c => c.toLowerCase().includes('fecha')),
      pos: cols.findIndex(c => c.toLowerCase().includes('pos')),
      modelo: cols.findIndex(c => c.toLowerCase().includes('model')),
      imei: cols.findIndex(c => c.toLowerCase() === 'imei'),
    };

    todosLosIMEIs = rows.filter(r => r.c[i.imei]?.v).map(r => ({
      supervisor: r.c[i.supervisor]?.v || '',
      dni: String(r.c[i.dni]?.v || '').trim(),
      user: r.c[i.user]?.v || '',
      fecha: r.c[i.fecha]?.v || '',
      pos: r.c[i.pos]?.v || '',
      modelo: r.c[i.modelo]?.v || '',
      imei: String(r.c[i.imei]?.v || '').trim(),
    }));

    try {
      const urlC = 'https://docs.google.com/spreadsheets/d/' + SHEETS_ID + '/gviz/tq?tqx=out:json&sheet=Constancias';
      const resC = await fetch(urlC, { mode: 'cors' });
      const textC = await resC.text();
      const jsonC = JSON.parse(textC.substring(textC.indexOf('{'), textC.lastIndexOf('}') + 1));
      const colsC = jsonC.table.cols.map(c => c.label);
      const rowsC = jsonC.table.rows;
      const idxImei   = colsC.findIndex(c => c.toLowerCase() === 'imei');
      const idxEstado = colsC.findIndex(c => c.toLowerCase() === 'estado');
      constanciasStatus = {};
      rowsC.forEach(r => {
        if (r.c[idxImei]?.v && r.c[idxEstado]?.v) {
          constanciasStatus[String(r.c[idxImei].v).trim()] = r.c[idxEstado].v;
        }
      });
    } catch(e) {}

    const supervisores = [...new Set(todosLosIMEIs.map(r => r.supervisor).filter(Boolean))].sort();
    const select = document.getElementById('supervisor-select');
    supervisores.forEach(sup => {
      const opt = document.createElement('option');
      opt.value = sup; opt.textContent = sup;
      select.appendChild(opt);
    });
    document.getElementById('loading-supervisores').style.display = 'none';
  } catch (err) {
    const el = document.getElementById('loading-supervisores');
    el.innerHTML = '<span style="color:var(--error)">⚠ Error al cargar datos. Verificá la conexión.</span>';
    el.style.display = 'block';
  }
}

function elegirRol(rol) {
  rolSeleccionado = rol;
  document.getElementById('btn-promotor').classList.toggle('active', rol === 'promotor');
  document.getElementById('btn-supervisor').classList.toggle('active', rol === 'supervisor');

  imeisSeleccionados.clear(); fotosMap = {};
  ['step-supervisor','step-dni','step-imeis','step-upload'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));

  if (rol === 'promotor') {
    document.getElementById('dni-num').textContent = '2';
    document.getElementById('dni-title').textContent = 'Tu DNI';
    document.getElementById('imei-num').textContent = '3';
    document.getElementById('upload-num').textContent = '4';
    document.getElementById('supervisor-badge').classList.add('hidden');
    document.getElementById('bloque-dni').classList.remove('hidden');
    document.getElementById('bloque-promotor-select').classList.add('hidden');
    document.getElementById('step-dni').classList.remove('hidden');
  } else {
    document.getElementById('dni-num').textContent = '3';
    document.getElementById('dni-title').textContent = 'Promotor';
    document.getElementById('imei-num').textContent = '4';
    document.getElementById('upload-num').textContent = '5';
    document.getElementById('bloque-dni').classList.add('hidden');
    document.getElementById('bloque-promotor-select').classList.remove('hidden');
    document.getElementById('step-supervisor').classList.remove('hidden');
  }

  document.getElementById('dni-input').value = '';
  setTimeout(() => document.getElementById(rol === 'promotor' ? 'step-dni' : 'step-supervisor')
    .scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function seleccionarSupervisor() {
  const sup = document.getElementById('supervisor-select').value;
  if (!sup) return;
  supervisorSeleccionado = sup;

  const badge = document.getElementById('supervisor-badge');
  badge.innerHTML = '<strong style="color:var(--accent)">Supervisor:</strong> ' + sup;
  badge.classList.remove('hidden');

  const promotores = [...new Map(
    todosLosIMEIs
      .filter(r => r.supervisor === sup)
      .map(r => [r.dni, r])
  ).values()].sort((a, b) => a.user.localeCompare(b.user));

  const select = document.getElementById('promotor-select');
  select.innerHTML = '<option value="">— Seleccioná un promotor —</option>';
  promotores.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.dni;
    opt.textContent = p.user + ' — DNI: ' + p.dni;
    select.appendChild(opt);
  });

  document.getElementById('step-dni').classList.remove('hidden');
  document.getElementById('step-imeis').classList.add('hidden');
  document.getElementById('step-upload').classList.add('hidden');
  imeisSeleccionados.clear(); fotosMap = {};

  setTimeout(() => document.getElementById('step-dni').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function seleccionarPromotor() {
  const dni = document.getElementById('promotor-select').value;
  if (!dni) return;

  let encontrados = todosLosIMEIs.filter(r =>
    r.dni === dni && r.supervisor === supervisorSeleccionado
  );

  imeisSeleccionados.clear(); fotosMap = {};
  document.getElementById('step-upload').classList.add('hidden');

  if (encontrados.length === 0) {
    alert('No se encontraron IMEIs pendientes para este promotor.');
    return;
  }

  imeisPromotor = encontrados;
  mostrarIMEIs(encontrados);
}

async function buscarDNI() {
  const dni = document.getElementById('dni-input').value.trim();
  if (!dni || dni.length < 7) { alert('Ingresá un DNI válido (7-8 dígitos).'); return; }

  document.getElementById('loading-dni').style.display = 'block';
  document.getElementById('step-imeis').classList.add('hidden');
  document.getElementById('step-upload').classList.add('hidden');
  imeisSeleccionados.clear(); fotosMap = {};

  let encontrados = todosLosIMEIs.filter(r => r.dni === String(dni).trim());
  if (rolSeleccionado === 'supervisor' && supervisorSeleccionado) {
    encontrados = encontrados.filter(r => r.supervisor === supervisorSeleccionado);
  }

  document.getElementById('loading-dni').style.display = 'none';

  if (encontrados.length === 0) {
    alert(rolSeleccionado === 'supervisor'
      ? 'No se encontraron IMEIs para ese DNI en tu zona.'
      : 'No se encontraron IMEIs pendientes para ese DNI.');
    return;
  }

  imeisPromotor = encontrados;
  mostrarIMEIs(encontrados);
}

function mostrarIMEIs(imeis) {
  const step = document.getElementById('step-imeis');
  step.classList.remove('hidden');

  document.getElementById('promotor-info').innerHTML =
    '<strong style="color:var(--ink2)">' + imeis[0].user + '</strong>' +
    '<span style="color:var(--muted);margin-left:8px">DNI: ' + imeis[0].dni + '</span>' +
    '<span style="color:var(--accent);margin-left:8px;font-weight:700">' + imeis.length + ' IMEI' + (imeis.length>1?'s':'') + ' pendiente' + (imeis.length>1?'s':'') + '</span>';

  const list = document.getElementById('imei-list');
  list.innerHTML = '';
  imeis.forEach((item, i) => {
    const estado = constanciasStatus[item.imei] || 'Pendiente';
    const esAprobado = estado === 'Aprobado';
    const statusColor = esAprobado ? '#16a34a' : estado === 'Rechazado' ? '#dc2626' : '#d97706';
    const statusBg = esAprobado ? '#f0fdf4' : estado === 'Rechazado' ? '#fef2f2' : '#fff7ed';

    const card = document.createElement('div');
    card.className = 'imei-card' + (esAprobado ? ' aprobado' : '');
    card.id = 'imei-card-' + i;
    if (!esAprobado) card.onclick = () => toggleIMEI(i);
    card.style.opacity = esAprobado ? '0.7' : '1';
    card.innerHTML =
      '<div class="imei-header">' +
        '<div class="imei-check" id="check-' + i + '">✓</div>' +
        '<div class="imei-info">' +
          '<div class="imei-number">' + item.imei + '</div>' +
          // ── CAMBIO 2: parseFecha() en la lista de IMEIs ──
          '<div class="imei-meta">' + item.modelo + ' · ' + item.pos + (item.fecha ? ' · ' + parseFecha(item.fecha) : '') + '</div>' +
        '</div>' +
        '<span class="imei-status" style="background:' + statusBg + ';color:' + statusColor + '">' + estado + '</span>' +
      '</div>';
    list.appendChild(card);
  });

  actualizarContador();
  step.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleIMEI(idx) {
  if (imeisSeleccionados.has(idx)) {
    imeisSeleccionados.delete(idx);
    document.getElementById('imei-card-' + idx).classList.remove('selected');
  } else {
    imeisSeleccionados.add(idx);
    document.getElementById('imei-card-' + idx).classList.add('selected');
  }
  actualizarContador();
}

function selectAll() {
  const allSelected = imeisSeleccionados.size === imeisPromotor.length;
  imeisPromotor.forEach((_, i) => {
    if (allSelected) {
      imeisSeleccionados.delete(i);
      document.getElementById('imei-card-' + i).classList.remove('selected');
    } else {
      imeisSeleccionados.add(i);
      document.getElementById('imei-card-' + i).classList.add('selected');
    }
  });
  actualizarContador();
}

function actualizarContador() {
  const n = imeisSeleccionados.size;
  document.getElementById('count-badge').textContent = n > 0 ? n + ' seleccionado' + (n>1?'s':'') : '';
  document.getElementById('btn-continuar').disabled = n === 0;
}

function irAUpload() {
  const step = document.getElementById('step-upload');
  step.classList.remove('hidden');
  fotosMap = {};

  const container = document.getElementById('imei-upload-list');
  container.innerHTML = '';

  [...imeisSeleccionados].sort((a,b)=>a-b).forEach(idx => {
    const item = imeisPromotor[idx];
    const div = document.createElement('div');
    div.className = 'imei-upload-item';
    div.id = 'upload-item-' + idx;
    div.innerHTML =
      '<div class="imei-upload-header">' +
        '<div class="imei-num">' + item.imei + '</div>' +
        // ── CAMBIO 3: parseFecha() en el paso de upload ──
        '<div class="imei-det">' + item.modelo + ' · ' + item.pos + (item.fecha ? ' · ' + parseFecha(item.fecha) : '') + '</div>' +
      '</div>' +
      '<div class="imei-upload-body">' +
        '<div class="upload-zone" id="zone-' + idx + '" onclick="document.getElementById(\'file-' + idx + '\').click()">' +
          '<input type="file" id="file-' + idx + '" accept="image/*" style="display:none" onchange="handleFoto(this,' + idx + ')">' +
          '<div class="upload-icon">📷</div>' +
          '<div class="upload-text">Tocar para subir foto</div>' +
          '<div class="upload-sub">JPG, PNG — máx. 10MB</div>' +
        '</div>' +
        '<div class="upload-filename" id="fname-' + idx + '"></div>' +
        '<img class="preview-thumb" id="thumb-' + idx + '" src="" alt="preview">' +
      '</div>';
    container.appendChild(div);
  });

  actualizarProgreso();
  step.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function handleFoto(input, idx) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('La foto es muy grande. Máximo 10MB.'); return; }

  fotosMap[idx] = file;

  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('thumb-' + idx).src = e.target.result;
    document.getElementById('thumb-' + idx).style.display = 'block';
    document.getElementById('fname-' + idx).textContent = '✓ ' + file.name;
    document.getElementById('fname-' + idx).style.display = 'block';
    document.getElementById('zone-' + idx).classList.add('has-file');
    document.getElementById('upload-item-' + idx).classList.add('done');
  };
  reader.readAsDataURL(file);
  actualizarProgreso();
}

function actualizarProgreso() {
  const total = imeisSeleccionados.size;
  const cargadas = Object.keys(fotosMap).length;
  const pct = total > 0 ? Math.round((cargadas / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = cargadas + ' de ' + total + ' fotos cargadas';
  document.getElementById('btn-enviar').disabled = cargadas < total;
}

async function enviarConstancias() {
  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const ahora = new Date();
  const hp = new Date(ahora.toLocaleString('en-US', { timeZone: 'America/Lima' }));
  const fechaHora = hp.getFullYear() + '-' + String(hp.getMonth()+1).padStart(2,'0') + '-' + String(hp.getDate()).padStart(2,'0') + ' ' + String(hp.getHours()).padStart(2,'0') + ':' + String(hp.getMinutes()).padStart(2,'0') + ':' + String(hp.getSeconds()).padStart(2,'0');

  const constancias = [];
  for (const idx of imeisSeleccionados) {
    const item = imeisPromotor[idx];
    const file = fotosMap[idx];
    const base64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.readAsDataURL(file);
    });
    constancias.push({
      fechaEnvio: fechaHora,
      supervisor: item.supervisor,
      dni: item.dni,
      user: item.user,
      imei: item.imei,
      modelo: item.modelo,
      pos: item.pos,
      fechaVenta: item.fecha,
      fotoBase64: base64,
      fotoNombre: file.name
    });
  }

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'subirConstancias', constancias })
    });
    showSuccess(constancias);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Enviar constancias';
    alert('Error al enviar. Intentá de nuevo.');
  }
}

function showSuccess(constancias) {
  ['step-rol','step-supervisor','step-dni','step-imeis','step-upload'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  document.getElementById('success-screen').style.display = 'block';

  const lista = constancias.map(c =>
    '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:8px;text-align:left;">' +
      '<div style="font-size:13px;font-weight:700;color:#166534;">📱 ' + c.imei + '</div>' +
      '<div style="font-size:11px;color:#4b7a5a;margin-top:2px;">' + c.modelo + ' · ' + c.pos + '</div>' +
      '<div style="font-size:11px;color:#4b7a5a;">📷 Foto cargada: <strong>' + c.fotoNombre + '</strong></div>' +
    '</div>'
  ).join('');

  document.getElementById('success-msg').innerHTML =
    '<strong>' + constancias.length + '</strong> constancia' + (constancias.length>1?'s':'') + ' enviada' + (constancias.length>1?'s':'') + ' correctamente.' +
    '<br><span style="font-size:12px;">Serán revisadas a la brevedad.</span>' +
    '<div style="margin-top:16px;">' + lista + '</div>';
}

function resetApp() {
  rolSeleccionado = null; supervisorSeleccionado = null;
  imeisPromotor = []; imeisSeleccionados.clear(); fotosMap = {};
  document.getElementById('supervisor-select').value = '';
  document.getElementById('dni-input').value = '';
  document.getElementById('btn-promotor').classList.remove('active');
  document.getElementById('btn-supervisor').classList.remove('active');
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('step-rol').classList.remove('hidden');
  ['step-supervisor','step-dni','step-imeis','step-upload'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
