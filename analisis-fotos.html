<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVO — Análisis de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1e46e6;
    --accent2: #0f2a9e;
    --ink: #0a0a0f;
    --ink2: #1a1a2e;
    --bg: #f4f6ff;
    --surface: #ffffff;
    --border: #e2e8f0;
    --muted: #94a3b8;
    --success: #16a34a;
    --error: #dc2626;
    --warn: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--ink2); min-height: 100vh; }

  .topbar { background: #000; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { color: #fff; font-weight: 800; font-size: 20px; letter-spacing: 1px; }
  
  .app-container { display: flex; height: calc(100vh - 52px); }
  
  /* SIDEBAR */
  .sidebar { width: 320px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
  .search-area { flex: 1; display: flex; flex-direction: column; }
  textarea { flex: 1; width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-family: inherit; font-size: 14px; resize: none; margin-bottom: 16px; }
  .btn-run { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
  .btn-run:hover { background: var(--accent2); transform: translateY(-2px); }

  /* MAIN CONTENT */
  .main-content { flex: 1; padding: 40px; overflow-y: auto; }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
  
  .photo-card { background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; }
  .photo-img { width: 100%; height: 380px; object-fit: cover; background: #f8fafc; cursor: pointer; }
  .photo-footer { padding: 16px; border-top: 1px solid var(--border); }
  
  /* LOGIN SCREEN */
  #loginScreen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: #fff; }
  .login-card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
  .login-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>VIVO SECURITY</h2>
    <p style="margin-bottom:20px; color:rgba(255,255,255,0.6)">Ingresa tus credenciales</p>
    <input type="email" id="loginEmail" class="login-input" placeholder="Correo corporativo">
    <input type="password" id="loginApiKey" class="login-input" placeholder="Anthropic API Key">
    <button onclick="doLogin()" class="btn-run" style="width:100%; margin-top:10px">ENTRAR</button>
  </div>
</div>

<div id="appContent" style="display:none">
  <div class="topbar">
    <div class="logo">VIVO ANALYZER</div>
    <div id="topbar-date" style="color:white"></div>
  </div>

  <div class="app-container">
    <div class="sidebar">
      <div class="search-area">
        <label style="font-weight:700; font-size:12px; margin-bottom:8px">IMEIS A CONSULTAR</label>
        <textarea id="imeiInput" placeholder="Pega los IMEIs aquí..."></textarea>
        <button class="btn-run" onclick="ejecutarBusqueda()">ANALIZAR FOTOS</button>
      </div>
    </div>

    <div class="main-content">
      <h2 id="statusTitle" style="margin-bottom:24px">Esperando consulta...</h2>
      <div id="resultsGrid" class="results-grid"></div>
    </div>
  </div>
</div>

<script>
