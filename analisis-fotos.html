<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVO — Análisis de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1e46e6;
    --accent2: #0f2a9e;
    --ink: #0a0a0f;
    --ink2: #1a1a2e;
    --bg: #f4f6ff;
    --surface: #ffffff;
    --border: #e2e8f0;
    --muted: #94a3b8;
    --success: #16a34a;
    --error: #dc2626;
    --warn: #d97706;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--ink2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Login Screen */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: #000;
    width: 100%;
    max-width: 400px;
    padding: 40px;
    text-align: center;
    border: 1px solid #333;
    border-radius: 24px;
  }

  /* Topbar */
  .topbar {
    background: #000;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    flex-shrink: 0;
  }

  .logo {
    color: #fff;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 1px;
  }

  /* Main Layout */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 350px;
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px;
    flex-shrink: 0;
  }

  .search-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 2px solid var(--border);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    transition: 0.3s;
  }

  .btn-run {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
    text-transform: uppercase;
  }

  /* Content Area */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .photo-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .photo-img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    background: #f8fafc;
  }
</style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color: #fff; margin-bottom: 8px;">VIVO SECURITY</h2>
        <input type="email" id="loginEmail" placeholder="Correo" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
        <input type="password" id="loginApiKey" placeholder="API Key" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
        <button onclick="handleLogin()" class="btn-run" style="width:100%; margin-top:10px;">Entrar</button>
    </div>
</div>

<div id="appContent" style="display:none; flex-direction:column; height:100vh;">
    <div class="topbar">
        <div class="logo">VIVO ANALYZER</div>
    </div>
    <div class="app-layout">
        <div class="sidebar">
            <div class="search-area">
                <textarea id="imeiInput" placeholder="Pega los IMEIs aquí..."></textarea>
                <button class="btn-run" onclick="processPhotos()">Analizar Fotos</button>
            </div>
        </div>
        <div class="main-content">
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>
</div>

<script>
async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    if(email.includes('@')) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContent').style.display = 'flex';
    }
}

async function processPhotos() {
    const input = document.getElementById('imeiInput').value;
    const grid = document.getElementById('resultsGrid');
    const imeis = input.split('\n').filter(i => i.trim());
    
    grid.innerHTML = 'Cargando...';

    try {
        const response = await fetch('https://docs.google.com/spreadsheets/d/1XfB158A5R-6R5n9pS6_Wz3-D6X37xW0m/gviz/tq?tqx=out:json');
        const text = await response.text();
        const data = JSON.parse(text.substr(47).slice(0, -2));
        const rows = data.table.rows;

        grid.innerHTML = '';
        
        imeis.forEach(imei => {
            const row = rows.find(r => r.c[4] && String(r.c[4].v).includes(imei.trim()));
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            let imgUrl = 'https://via.placeholder.com/300x400?text=No+Encontrado';
            if(row && row.c[8]) imgUrl = row.c[8].v;

            card.innerHTML = `<img src="${imgUrl}" class="photo-img"><div style="padding:15px;">IMEI: ${imei}</div>`;
            grid.appendChild(card);
        });
    } catch (e) {
        grid.innerHTML = 'Error al cargar datos';
    }
}
</script>
</body>
</html>
