<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVO — Análisis de Fotos</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1e46e6;
    --accent2: #0f2a9e;
    --ink: #0a0a0f;
    --ink2: #1a1a2e;
    --bg: #f4f6ff;
    --surface: #ffffff;
    --border: #e2e8f0;
    --muted: #94a3b8;
    --success: #16a34a;
    --error: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--ink2); min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: #000; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { color: #fff; font-weight: 800; font-size: 20px; letter-spacing: 1px; }
  
  .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
  
  /* BUSCADOR */
  .card { background: var(--surface); border-radius: 16px; padding: 32px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
  h1 { font-size: 28px; margin-bottom: 8px; font-weight: 700; color: var(--ink); }
  .subtitle { color: var(--muted); margin-bottom: 24px; }
  
  textarea { width: 100%; height: 120px; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-family: inherit; font-size: 14px; transition: 0.3s; resize: none; background: #fafbff; margin-bottom: 16px; }
  textarea:focus { outline: none; border-color: var(--accent); background: #fff; }
  
  .btn { background: var(--accent); color: #fff; border: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; width: 100%; max-width: 300px; }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  
  /* GRILLA DE RESULTADOS */
  .results { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .photo-card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; animation: fadeIn 0.5s ease; }
  .photo-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
  .photo-img { width: 100%; height: 320px; object-fit: cover; background: #f1f5f9; cursor: pointer; border-bottom: 1px solid var(--border); }
  .photo-info { padding: 16px; text-align: left; }
  .photo-imei { font-weight: 700; font-size: 15px; color: var(--ink); display: block; }
  .photo-status { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-top: 4px; display: block; }

  #loading { display: none; margin-top: 20px; color: var(--accent); font-weight: 700; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">VIVO ANALYZER</div>
</div>

<div class="main-container">
  <div class="card">
    <h1>Analizador de Constancias</h1>
    <p class="subtitle">Pega los IMEIs aquí para recuperar las fotos del sistema.</p>
    
    <textarea id="imeiInput" placeholder="Ejemplo: 352489001234567, 861234007894561..."></textarea>
    <br>
    <button class="btn" onclick="buscarFotos()">CONSULTAR DATOS</button>
    <div id="loading">Buscando en la base de datos...</div>
  </div>

  <div id="resultsContainer" class="results"></div>
</div>

<script>
// CONFIGURACIÓN DEL EXCEL
const SHEET_ID = '1XfB158A5R-6R5n9pS6_Wz3-D6X37xW0m';
const TAB_NAME = 'Constancias';
const URL_DATA = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${TAB_NAME}`;

async function buscarFotos() {
  const input = document.getElementById('imeiInput').value;
  const container = document.getElementById('resultsContainer');
  const loading = document.getElementById('loading');
  
  // Limpiar y separar IMEIs
  const listaImeis = input.split(/[\n, ]+/).map(i => i.trim()).filter(i => i.length > 5);
  
  if (listaImeis.length === 0) {
    alert("Por favor, ingresa al menos un IMEI.");
    return;
  }

  loading.style.display = 'block';
  container.innerHTML = '';

  try {
    const resp = await fetch(URL_DATA);
    const text = await resp.text();
    // Limpieza del formato JSON de Google
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    
    // Crear mapa de búsqueda rápida
    const db = {};
    rows.forEach(r => {
      const imei = String(r.c?.[4]?.v || '').trim();  // Columna E (IMEI)
      const link = String(r.c?.[8]?.v || '').trim();  // Columna I (Link Drive)
      const b64  = String(r.c?.[11]?.v || '').trim(); // Columna L (FOTO BASE64)
      
      if (imei) db[imei] = { link, b64 };
    });

    listaImeis.forEach(imei => {
      const entry = db[imei];
      let imgFinal = 'https://via.placeholder.com/300x400?text=No+Encontrado';
      let statusHtml = `<span style="color:var(--error)">Sin registro</span>`;

      if (entry) {
        // PRIORIDAD: Foto en Columna L (Base64)
        if (entry.b64 && entry.b64.startsWith('data:image')) {
          imgFinal = entry.b64;
          statusHtml = `<span style="color:var(--success)">● Foto OK</span>`;
        } 
        // PLAN B: Link de Drive
        else if (entry.link) {
          imgFinal = entry.link;
          statusHtml = `<span style="color:var(--accent)">● Link Drive</span>`;
        }
      }

      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `
        <img src="${imgFinal}" class="photo-img" onclick="window.open(this.src)" onerror="this.src='https://via.placeholder.com/300x400?text=Error+al+cargar'">
        <div class="photo-info">
          <span class="photo-imei">IMEI: ${imei}</span>
          <span class="photo-status">${statusHtml}</span>
        </div>
      `;
      container.appendChild(card);
    });

  } catch (e) {
    console.error(e);
    alert("Error al conectar con la base de datos.");
  } finally {
    loading.style.display = 'none';
  }
}
</script>

</body>
</html>
